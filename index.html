<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skyline — Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="sky" id="sky"></div>

  <main class="app">

    <header class="topbar">
      <div class="brand">Skyline</div>
      <form class="search" id="searchForm" autocomplete="off">
        <input type="text" id="cityInput" placeholder="Search a city…" aria-label="Search a city" />
        <button type="submit" class="btn-icon" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button type="button" class="btn-icon" id="locateBtn" aria-label="Use my location" title="Use my location">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </form>
    </header>

    <section id="status" class="status" hidden></section>

    <section class="hero" id="hero" hidden>
      <div class="place">
        <h1 id="placeName">—</h1>
        <p id="placeMeta">—</p>
      </div>

      <div class="temp-row">
        <div class="icon-wrap" id="iconWrap"></div>
        <div class="temp-block">
          <span class="temp" id="temp">--</span>
          <button class="unit-toggle" id="unitToggle" title="Switch units">°C</button>
        </div>
      </div>

      <p class="condition" id="condition">—</p>

      <div class="stat-row">
        <div class="stat">
          <span class="stat-label">Feels like</span>
          <span class="stat-value" id="feelsLike">--</span>
        </div>
        <div class="stat">
          <span class="stat-label">Humidity</span>
          <span class="stat-value" id="humidity">--</span>
        </div>
        <div class="stat">
          <span class="stat-label">Wind</span>
          <span class="stat-value" id="wind">--</span>
        </div>
      </div>
    </section>

    <section class="hourly" id="hourly" hidden>
      <h2>Next 24 hours</h2>
      <div class="hourly-strip" id="hourlyStrip"></div>
    </section>

    <section class="daily" id="daily" hidden>
      <h2>5-day outlook</h2>
      <div class="daily-list" id="dailyList"></div>
    </section>

    <section class="empty" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M6 15a4 4 0 0 1 .5-7.97A5.5 5.5 0 0 1 17 8.5a3.5 3.5 0 0 1-.5 6.98" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <p>Search a city, or use your location, to see the sky there right now.</p>
    </section>

    <div class="recents" id="recents"></div>

  </main>

<script src="script.js"></script>
</body>
</html>
